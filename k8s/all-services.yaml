apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: 951066974787.dkr.ecr.ap-southeast-2.amazonaws.com/frontend:latest
        ports:
        - containerPort: 80
